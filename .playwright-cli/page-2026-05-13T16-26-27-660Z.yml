                      - paragraph [ref=e1365]: "Prevención de náuseas y vómitos inducidos por quimio/radioterapia y postoperatorios. Vómitos de repetición asociados a gastroenteritis aguda. Uso preferente frente a otros antieméticos de emergencia en edad pediátrica en cuadros con vómito (TCE moderado-severo, debut diabético, GEA, abdomen agudo, intoxicaciones e ingesta de gastroerosivos, alergias alimentarias, cefaleas, patología renal, etc.). No administrar como tratamiento preventivo de vómitos en emergencias por su posibilidad de enmascarar la presencia o no de este síntoma como marcador de alerta.. Dosis adultos: - 8 mg vo en dosis única - 4 mg iv en dosis única en no menos de 30 sg. Máx. 8 mg dosis. También se puede administrar im. Dosis niños: - Vía oral, según peso corporal, en dosis única:de 8 a 15 Kg: 2 mgde 15 a 30 Kg: 4 mg30 a 50 kg: 6 mg> 50 Kg: 8 mg - de 8 a 15 Kg: 2 mg - de 15 a 30 Kg: 4 mg - 30 a 50 kg: 6 mg - > 50 Kg: 8 mg - Vía iv en inyección lenta, no menos de 30 sg:Niños ≥ 2 años y < 40 kg: 0,1 mg/kg iv. Máximo 4 mgNiños > 40 kg: 4 mg/dosisNiños > 1 mes: 0,1 mg/kg en náuseas y/o vómitos tras intervención quirúrgica. (AEMPS Diciembre 2020) - Niños ≥ 2 años y < 40 kg: 0,1 mg/kg iv. Máximo 4 mg - Niños > 40 kg: 4 mg/dosis - Niños > 1 mes: 0,1 mg/kg en náuseas y/o vómitos tras intervención quirúrgica. (AEMPS Diciembre 2020)"
