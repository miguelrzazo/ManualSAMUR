                      - paragraph [ref=e1319]: "Tratamiento de estados de hipotensión aguda, tales como los que ocasionalmente se dan después de una feocromocitomía, simpatectomía, poliomelitis, anestesia espinal, infarto de miocardio, shock séptico, transfusiones y reacciones a fármacos. Indicada como coadyuvante temporal en el tratamiento de la parada cardiaca y de la hipotensión aguda - Adultos: - En perfusión iv a dosis de 0,1 - 0,5 mcg/kg/min (7-35 mcg/min). Controlando la presión arterial hasta conseguir TAS > 90 mmHg. - Prepare 2 ampollas de 10 mg en 80 ml de SG 5% (1 ml = 200 mcg, 1 gota = 10 mcg) comenzando por 4 ml/h (4 mcgotas/min) hasta 25 ml/h (25 mcgotas/min) en un paciente de 70- 80 kg. - Niños: - En perfusión iv a dosis de 0,1 - 0,3 mcg/kg/min. Controlando la presión arterial hasta conseguir TAS > 90 mmHg. Administración: Por vía IV Debe diluirse la NA con glucosa al 5% en agua destilada o glucosa al 5% en solución de cloruro sódico. No debe usarse solución de cloruro sódico únicamente. Evitar administrar en las venas de los miembros inferiores de ancianos y pacientes con enfermedades oclusivas debido a una posible vasoconstricción. No debe mezclarse con sales de hierro, álcalis y agentes oxidantes. No debe utilizar la solución inyectable si tiene un color marrón o si contiene precipitado."
