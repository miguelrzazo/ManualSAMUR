                      - paragraph [ref=e1600]: "Tratamiento de arritmias ventriculares (TV/FV) en pacientes con hipomagnesemia documentada o en los que han fracasado las medidas habituales. tratamiento de la \"Torsades de pointes\". pacientes con arritmias y alteraciones electrolíticas (en particular hipopotasemia), tratamiento concomitante con digoxina o diuréticos y en pacientes alcohólicos o desnutrición grave. Tratamiento secundario del asma severo. Crisis convulsivas en la Eclampsia. - Adultos: - PCR: dosis de (37 mg/kg) 1-2 g iv. diluida en 100 ml de SG al 5%, administrada en 1 - 2 minutos, que puede repetirse 5 -10 minutos después, si no ha sido eficaz. - Eclampsia: a dosis de ataque de 4 g (2,5 a 3 ampollas) iv diluidos en 100 ml de SG al 5%, a pasar en 10 a 20 minutos. Perfusión a 600 a 300 ml/h. - Torsade de Pointes (no PCR): a dosis 1-2 g diluidos en 100 ml de SG 5% a pasar entre 5 y 60 min. Utilice ratios más lentos en pacientes estables e infusiones más rápidas en pacientes inestables (600 a 100 ml/h) - En desnutrición o alcoholismo, tratamiento de las crisis convulsivas: 1,5 g al 50% de concentración (1 ampollla diluida en 10 ml SSF). - Niños: - 25 - 50 mg/kg iv/io en caso de Torsades de Pointes o hipomagnesemia. Máximo 2 g."
