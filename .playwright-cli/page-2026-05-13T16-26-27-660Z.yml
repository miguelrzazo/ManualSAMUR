                      - paragraph [ref=e469]: "Tratamiento de mantenimiento con glucocorticoides para el control de la inflamación subyacente de las vías respiratorias en pacientes con asma bronquial. Tratamiento del asma bronquial persistente en pacientes en los que la utilización de un inhalador no tenga resultado satisfactorio Tratamiento de pseudocrup muy grave (laringitis subglótica) en el que está indicada la hospitalización. Dosis nebulización: Asma: - Adultos (incluidos ancianos) y niños y adolescentes >12 años: dosis diaria total de 0,5 - 2 mg. En casos muy graves, se puede incrementar la dosis hasta 4 mg. - Niños a partir de 6 meses: dosis diaria total de 0,25 - 1 mg. En casos muy graves o en pacientes dependientes de glucocorticoides orales, se podría considerar una dosis inicial más elevada, por ejemplo 2 mg en dosis única o 2 dosis de 1mg (1 ampolla, 2ml) espaciadas 30 minutos. Laringotraqueobronquitis (crup): - En lactantes y niños con laringitis aguda-crup: 2 mg de budesonida nebulizada. Se administra en dosis única, o en dos dosis de 1 mg separadas por un intervalo de 30 minutos. La dosificación se puede repetir cada 12 horas durante un máximo de 36 horas o hasta obtener mejoría clínica. - En lactantes < 6 meses se administra una dosis de 1 mg (1 ampolla de 2 ml). Budesonida 0,50 mg/ml suspensión para nebulización es compatible con suero fisiológico (solución salina al 0,9%) y con soluciones para nebulización de terbutalina, salbutamol, fenoterol, acetilcisteína, cromoglicato sódico o ipratropio. La mezcla deberá utilizarse en un plazo de 30 minutos. La ampolla está marcada con una línea que indica el volumen de 1 ml cuando se sostiene la ampolla boca abajo. Si solamente se necesita 1 ml, vaciar el contenido hasta que la superficie del líquido restante alcance la línea indicadora de 1 ml. El nebulizador debe conectarse a un compresor de aire con un flujo de aire adecuado (6-8 l/min), y el volumen de llenado debe ser de 2 a 4 ml. Tras su administración en nebulización se debe lavar la zona facial cutánea con agua y enjuagar la boca o beber agua, ya que si no se favorece la candidiasis."
