                      - paragraph [ref=e456]: "obstrucción reversible de las vías aéreas apoyando el efecto broncodilatador de los beta-adrenérgicos, bien en formato nebulizado o combinado con estos mediante inhalación. Nebulización: - Adultos: 500 mcg [Diluya 1 ampolla en 2-3 ml de SSF y nebulice a 8 lpm]. Se puede repetir la dosis cada 20 min (máximo 3 dosis). Evitar la nebulización del producto sobre los ojos (puede desencadenar glaucoma agudo). - Niños:de 6-12 años: 250 mcg [1 ampolla en 4 ml]. Se puede repetir la dosis (máximo 750 mcg = 3 dosis).< 6 años: 125 mcg [1/2 ampolla en 4 ml]. Se puede repetir la dosis (máximo 500 mcg = 4 dosis). - de 6-12 años: 250 mcg [1 ampolla en 4 ml]. Se puede repetir la dosis (máximo 750 mcg = 3 dosis). - < 6 años: 125 mcg [1/2 ampolla en 4 ml]. Se puede repetir la dosis (máximo 500 mcg = 4 dosis). - Se puede usar simultaneamente con otros fármacos utilizados en el tratamiento de la obstrucción reversible de la vía aérea. No administre con Cromoglicato disódico simultaneamente en el mismo nebulizador. Inhalación (inhalador con fármaco presurizado- MDI): - Adultos: 80 mcg (4 pulsaciones) cada 20 minutos en dos tandas. Máx. 320 mcg/día - Niños: 40-80 mcg (2-4 pulsaciones) cada 20 minutos (máximo 3 tandas)"
