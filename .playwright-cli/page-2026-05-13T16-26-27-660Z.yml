                      - paragraph [ref=e1685]: "está indicado para la prevención de acontecimientos aterotrombóticos en pacientes adultos con Síndromes Coronarios Agudos (angina inestable, infarto de miocardio sin elevación del segmento ST [SCASEST] o infarto de miocardio con elevación del segmento ST [SCACEST]), incluidos los pacientes controlados con tratamiento médico (salvo pacientes que reciben trombólisis) y los sometidos a una intervención coronaria percutánea (ICP) o a un injerto de derivación de arteria coronaria. En cuadros coronarios agudos solo está aceptado el uso como doble antiagregación en los casos de SCACEST. - Adultos: SCACEST: Dosis de carga de 180 mg (2 comprimidos bucodispersables). Posteriormente en hospital se dará como dosis de mantenimiento 90 mg (2 veces al día). En caso de no ser comprimidos bucodispersables y para los pacientes que no pueden tragar los comprimidos enteros, éstos se pueden triturar en un polvo fino, mezclarse en medio vaso de agua y beberse inmediatamente. El vaso se debe enjuagar con medio vaso de agua adicional y beber el contenido. La mezcla también se puede administrar a través de una sonda nasogástrica (CH8 o mayor). Es importante lavar el interior de la sonda nasogástrica con agua después de la administración de la mezcla."
