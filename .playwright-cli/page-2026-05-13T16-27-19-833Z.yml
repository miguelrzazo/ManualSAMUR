                      - generic [ref=e322]: Iniciar RCP de alta calidad en ciclos de 2 minutos y confirmar el ritmo sin demoras evitables.
                      - generic [ref=e323]: Asegurar vía aérea, ventilación y monitorización con foco en ETCO2, SatO2 y ECG.
                      - generic [ref=e324]: Canalizar acceso vascular precoz y usar vía intraósea si la periférica no está disponible.
                      - generic [ref=e325]: Tratar causas reversibles durante la reanimación y sostener la reevaluación clínica y metabólica.
                      - generic [ref=e326]: La decisión de continuar o parar la reanimación se basa en oportunidad y beneficio, no solo en tiempo.
                  - paragraph [ref=e327]:
                    - strong [ref=e328]: Última modificación el 27/04/2026
                  - paragraph [ref=e329]:
                    - link "Ver Anexo - Algoritmo SVA Adulto" [ref=e330] [cursor=pointer]:
