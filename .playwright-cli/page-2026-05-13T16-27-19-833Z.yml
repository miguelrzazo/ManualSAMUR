                    - list [ref=e576]:
                      - listitem [ref=e577]: La cronología aislada no debe ser el único criterio para finalizar la reanimación.
                      - listitem [ref=e578]: Revisar periodo no-flow, primeros respondientes, causa probable, ritmo inicial y analítica de forma conjunta.
                      - listitem [ref=e579]: En asistolia sin causa tratable identificable, puede considerarse parar tras 20 minutos de SVA si el resto del contexto no favorece continuar.
                  - heading "PCR no recuperada" [level=3] [ref=e580]:
                    - strong [ref=e581]: PCR no recuperada
                  - list:
                    - listitem
                  - paragraph [ref=e582]: "En ausencia de respuesta del paciente, en el sentido de recuperación de pulso, la decisión de parar o continuar la reanimación se realizará en base a criterios de máxima oportunidad y beneficio para el paciente y no solo en criterios cronológicos. Los factores a tener en cuenta a la hora de tomar esta decisión serán, al menos, los siguientes:"
                  - list [ref=e583]:
                    - listitem [ref=e584]:
                      - paragraph [ref=e585]: Tiempo estimado sin reanimación (“periodo no-flow”) desde que ocurre la parada cardiaca.
                    - listitem [ref=e586]:
                      - paragraph [ref=e587]: Existencia de primeros respondientes.
                    - listitem [ref=e588]:
                      - paragraph [ref=e589]: Antecedentes patológicos.
                    - listitem [ref=e590]:
                      - paragraph [ref=e591]: Causa probable de la parada. Recuerde que especialmente en hipotermia, intoxicación por drogas, ahogamiento, electrocución y TEP que se fibrinolisa la duración de las maniobras de RCP debe ser más prolongada.
                    - listitem [ref=e592]:
                      - paragraph [ref=e593]: Ritmo inicial de parada.
                    - listitem [ref=e594]:
                      - paragraph [ref=e595]: "Estado metabólico inicial del paciente, valorado a través de la primera muestra analítica. Se valorarán fundamentalmente los valores de: pH, EB, K+, PCO2 y lactato."
                    - listitem [ref=e596]:
                      - paragraph [ref=e597]: Estado metabólico durante la reanimación. Se recomienda valorar el estado metabólico antes de tomar la decisión.
                    - listitem [ref=e598]:
                      - paragraph [ref=e599]: En caso de un posible ritmo de actividad eléctrica sin pulso, chequeo de la contractilidad mediante ecografía.
                    - listitem [ref=e600]:
                      - paragraph [ref=e601]: Tiempo de reanimación y edad del paciente, que en ningún caso serán criterios absolutos para finalizar la reanimación.
                    - listitem [ref=e602]:
                      - paragraph [ref=e603]: En el caso de las PCR en asistolia, si no se identifica ninguna causa tratable y ninguno de los factores anteriores sugiere continuar con la RCP, se puede considerar parar la reanimación tras 20 minutos de soporte vital avanzado.
                    - listitem [ref=e604]:
                      - paragraph [ref=e605]: Compruebe la ausencia de dinámica cardiaca con el Ecógrafo.
                    - listitem [ref=e606]:
                      - paragraph [ref=e607]: Considere la posibilidad de 'Código 9'.
                    - listitem [ref=e608]:
