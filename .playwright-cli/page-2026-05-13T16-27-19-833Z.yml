                    - generic [ref=e387]:
                      - generic [ref=e388]: RCP 2 min o 5 ciclos 30:2 antes de la nueva comprobación de ritmo.
                      - generic [ref=e389]: Pulso solo si aparece ritmo organizado y siempre en menos de 10 segundos.
                      - generic [ref=e390]: ETCO2 para confirmar TET y para reevaluar la calidad de la reanimación.
                      - generic [ref=e391]: "Analítica inicial: pH, EB, K+ y glucemia entre otras determinaciones."
                      - generic [ref=e392]: Adrenalina 1 mg iv/io cada 3 a 5 min con bolo posterior de suero.
                  - heading "Ritmos no desfibrilables" [level=2] [ref=e393]:
                    - strong [ref=e394]: Ritmos no desfibrilables
