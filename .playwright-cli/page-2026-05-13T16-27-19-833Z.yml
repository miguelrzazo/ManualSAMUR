                      - text: Ver Anexo - Algoritmo SVA Adulto
                      - img [ref=e331]
                    - text: ). Véase procedimiento de PCR en hipotermia accidental.
                  - list [ref=e335]:
                    - listitem [ref=e336]:
                      - text: "Ausencia de contraindicaciones evidentes:"
                      - list [ref=e337]:
                        - listitem [ref=e338]: Conocida enfermedad concomitante que compromete su pronóstico a corto plazo.
                        - listitem [ref=e339]: Deseo conocido de no RCP.
                    - listitem [ref=e340]: PCR presenciada por testigos.
                    - listitem [ref=e341]: Haber recibido maniobras de reanimación básica tras la parada, por testigos o por las unidades de SAMUR -Protección Civil, en un tiempo no superior a los 5 minutos desde que se produjo la parada cardiaca.
                    - listitem [ref=e342]: pH inicial en la primera muestra sanguínea de > 7,10.
                    - listitem [ref=e343]: Tiempo estimado desde el inicio de la PCR hasta la llegada al Laboratorio de Hemodinámica < 45 minutos (Objetivo PCR-inicio ECMO en <60 min).
                    - listitem [ref=e344]: ETCO2 por encima de 10 mm Hg en el momento de la inclusión.
                  - paragraph [ref=e345]: Se cumplimentará la HCE (historia clínica electrónica) con el apartado de ECMO correspondiente y utilizando el código patológico C.0.2 (PCR ECMO).
                  - generic [ref=e346]:
                    - generic [ref=e347]:
                      - img [ref=e349]
                      - paragraph [ref=e352]: Lectura Editorial
                      - generic [ref=e354]: Material Operativo Añadido
                    - paragraph [ref=e356]: Esta página conserva el texto original del manual como fuente canónica y mezcla objetos operativos junto a los apartados donde aportan contexto. Los anexos originales se muestran como objetos navegables y el índice lateral sigue reflejando únicamente la estructura del documento fuente.
