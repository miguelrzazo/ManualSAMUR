                    - generic [ref=e419]:
                      - generic [ref=e420]:
                        - img [ref=e421]
                        - generic [ref=e424]: Lista de verificación
                        - generic [ref=e425]: 0/6
                      - list [ref=e426]:
                        - listitem [ref=e427] [cursor=pointer]:
                          - img [ref=e428]
                          - generic [ref=e430]: Compresiones torácicas según estándar de RCP.
                        - listitem [ref=e431] [cursor=pointer]:
                          - img [ref=e432]
                          - generic [ref=e434]: Ventilación con reservorio y oxígeno a alto flujo.
                        - listitem [ref=e435] [cursor=pointer]:
                          - img [ref=e436]
                          - generic [ref=e438]: Confirmación del TET con ETCO2 si se intuba.
                        - listitem [ref=e439] [cursor=pointer]:
                          - img [ref=e440]
                          - generic [ref=e442]: Acceso vascular periférico o intraóseo.
                        - listitem [ref=e443] [cursor=pointer]:
                          - img [ref=e444]
                          - generic [ref=e446]: Monitorización ECG, SatO2 y ETCO2.
                        - listitem [ref=e447] [cursor=pointer]:
                          - img [ref=e448]
                          - generic [ref=e450]: Analítica inicial y reevaluación de causas reversibles.
                  - heading "Actividad eléctrica sin pulso (AESP) o asistolia." [level=3] [ref=e451]:
                    - strong [ref=e452]: Actividad eléctrica sin pulso (AESP) o asistolia.
                  - list:
                    - listitem
                  - paragraph [ref=e453]:
                    - text: Inicie compresiones torácicas conforme a estándares de
                    - strong [ref=e454]: RCP durante 2 minutos o
                    - text: 5 ciclos de 30:2.
                  - list [ref=e455]:
                    - listitem [ref=e456]:
                      - paragraph [ref=e457]: Si aparece un ritmo organizado tras el ciclo de 2 minutos, compruebe la presencia de pulso (sin emplear más de 10 sg).
                    - listitem [ref=e458]:
                      - paragraph [ref=e459]: Abra la vía aérea y ventile con balón de reanimación conectado a reservorio con O2 (oxigenoterapia a alto flujo con 10-12 l/min).
                    - listitem [ref=e460]:
                      - paragraph [ref=e461]: Realice intubación endotraqueal conforme a procedimiento.
                      - list [ref=e462]:
                        - listitem [ref=e463]: Utilice la ETCO2 para comprobar la adecuada colocación del TET.
                        - listitem [ref=e464]: De no ser posible la intubación (mediante laringoscopia, Frova o videolaringoscopia) mantenga ventilación con balón de reanimación.
                    - listitem [ref=e465]:
                      - paragraph [ref=e466]: Si el paciente ha sido intubado, ventile con respirador en modo CCSV o bien en IPPV a una frecuencia de 10-12 rpm, volumen corriente 6-8 ml/kg, PEEP 0-5 mbar y Pmax 50-70 mbar. Solo si no fuera posible utilizar el respirador, continúe con la ventilación ya iniciada mediante balón de reanimación con reservorio conectado a fuente de oxígeno 10-12 l/min (alto flujo).
                    - listitem [ref=e467]:
                      - paragraph [ref=e468]: "Monitorice: ECG, SatO2 y ETCO2."
                    - listitem [ref=e469]:
                      - paragraph [ref=e470]: Canalice una vía venosa, preferentemente periférica de grueso calibre.
                      - list [ref=e471]:
                        - listitem [ref=e472]: Realice analítica venosa para determinación de pH, EB, iones (K+) y glucemia entre otras.
                        - listitem [ref=e473]: Si no es posible vía periférica, canalice preferentemente vía intraósea.
                    - listitem [ref=e474]:
                      - paragraph [ref=e475]:
                        - text: Administre
                        - link "Adrenalina" [ref=e476] [cursor=pointer]:
                          - /url: /vademecum?farmaco=Adrenalina
                          - img [ref=e477]
                          - text: Adrenalina
                        - text: 1 mg en bolo iv cada 3 a 5 min. Tras cada dosis de Adrenalina, eleve el brazo y administre un bolo de 20 ml de suero. Si no se ha conseguido canalización venosa, utilice vía intraósea si está disponible.
                    - listitem [ref=e480]:
                      - paragraph [ref=e481]:
                        - text: Si no se consigue RCE
                        - strong [ref=e482]: continúe con RCP inmediata
                        - text: con compresiones torácicas y ventilación conforme a a estándares de
                        - strong [ref=e483]: RCP durante 2 minutos
                        - text: o 5 ciclos de 30:2, al menos, a 100 cpm (entre 100 y 120), durante 2 minutos. Compruebe el ritmo.
                    - listitem [ref=e484]:
                      - paragraph [ref=e485]: Si se identifica FV en el monitor en medio de un ciclo de 2 minutos de RCP, complete el ciclo de RCP antes de la correspondiente comprobación de ritmo y administración de descarga.
                    - listitem [ref=e486]:
                      - paragraph [ref=e487]:
                        - text: Valore las causas reversibles de PCR (
                        - strong [ref=e488]: 5 'H' y 5 'T'
                        - text: ") y trate en función de éstas:"
                      - list [ref=e489]:
                        - listitem [ref=e490]: Realice exploración ecográfica para descartar causas reversibles (taponamiento cardíaco, TEP, neumotórax a tensión, sangrado interno abdominal, etc)
                        - listitem [ref=e491]: Reevalúe las maniobras de RCP mediante SatO2 y ETCO2, para evitar hipoxia.
                        - listitem [ref=e492]:
                          - text: Ante sospecha de
                          - strong [ref=e493]: hipovolemia
                          - text: (causa más frecuente), expanda volumen de forma agresiva e inmediata según la posible causa de las pérdidas (ver procedimiento de shock).
                        - listitem [ref=e494]: Si existe hiperpotasemia, actúe como en procedimiento de hiperpotasemia grave.
                        - listitem [ref=e495]:
                          - text: Si existe hipopotasemia confirmada (< 3,5 mEq/L), administre
                          - link "Cloruropotasico" [ref=e496] [cursor=pointer]:
                            - /url: /vademecum?farmaco=Cloruropotasico
                            - img [ref=e497]
                            - text: Cloruropotasico
                          - text: iv (Cloruro potásico, 10 mEq/10 ml ampolla) a dosis de 10 mEq en 5 -10 min (velocidad máxima de 2 mEq/min).
                        - listitem [ref=e500]:
                          - text: Si existe hipocalcemia, administre
                          - link "GluconatoCalcico" [ref=e501] [cursor=pointer]:
                            - /url: /vademecum?farmaco=GluconatoCalcico
                            - img [ref=e502]
                            - text: GluconatoCalcico
                          - text: iv
                        - listitem [ref=e505]: Si existe hipoglucemia trátela.
                        - listitem [ref=e506]: Si existe hipotermia actuar según procedimiento.
                        - listitem [ref=e507]:
                          - text: Si existe
                          - strong [ref=e508]: neumotórax a tensión
                          - text: ", realice drenaje. (ver toracocentesis. Técnicas)."
                        - listitem [ref=e509]:
                          - text: Si existe
                          - strong [ref=e510]: taponamiento cardíaco
                          - text: (objetivado por exploración ecográfica), realice pericardiocentesis mientras prepara toracotomía de reanimación.
                        - listitem [ref=e511]:
                          - text: Ante
                          - strong [ref=e512]: intoxicación con fármacos
                          - text: ", (ver procedimiento de intoxicaciones)."
                        - listitem [ref=e513]: "Si se sospecha TEP como causa de la PCR, proceda como en el procedimiento específico (Ver TEP: fibrinolisis)"
                    - listitem [ref=e514]:
                      - paragraph [ref=e515]: Realice determinación de temperatura.
                    - listitem [ref=e516]:
                      - paragraph [ref=e517]: Canalice otra vía de calibre grueso, según posibilidades.
                    - listitem [ref=e518]:
                      - paragraph [ref=e519]:
                        - text: Administre
