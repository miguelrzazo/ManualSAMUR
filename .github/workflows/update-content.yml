name: Detect official manual updates

on:
  schedule:
    # Daily at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Detect official updates (no apply)
        run: npm run sync:manualsamur:detect

      - name: Upload update artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manual-update-detection
          path: |
            content/data/manual-sync.json
            content/data/manual-updates.json

      - name: Print quick summary
        run: |
          node -e 'const fs=require("fs");const data=JSON.parse(fs.readFileSync("content/data/manual-sync.json","utf8"));const run=data.runs?.[0];console.log(JSON.stringify({lastSyncAt:data.lastSyncAt,pendingChanges:data.pendingChanges?.length??0,runSummary:run?.summary??{}},null,2));'
