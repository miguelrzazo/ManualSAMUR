name: Detect official manual updates

on:
  schedule:
    # Monthly (day 1) at 04:00 UTC
    - cron: "0 4 1 * *"
  workflow_dispatch:
    inputs:
      procedure_ids:
        description: "Comma-separated procedure IDs to sync (leave empty for all)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: sudo apt-get install -y poppler-utils

      - name: Apply official updates
        run: |
          if [ -n "${{ github.event.inputs.procedure_ids }}" ]; then
            npm run sync:manualsamur:apply -- --ids=${{ github.event.inputs.procedure_ids }}
          else
            npm run sync:manualsamur:apply
          fi

      - name: Update history from latest sync run
        run: |
          node --input-type=module << 'EOF'
          import fs from "node:fs";
          import path from "node:path";

          const ROOT = process.cwd();
          const UPDATES_PATH = path.join(ROOT, "content/data/manual-updates.json");
          const HISTORY_PATH = path.join(ROOT, "content/data/manual-history.json");

          if (!fs.existsSync(UPDATES_PATH)) process.exit(0);
          const updates = JSON.parse(fs.readFileSync(UPDATES_PATH, "utf8"));
          const existing = fs.existsSync(HISTORY_PATH)
            ? JSON.parse(fs.readFileSync(HISTORY_PATH, "utf8"))
            : { generatedAt: new Date().toISOString(), entries: [] };

          const now = new Date();
          const yearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;

          // Build stable IDs: "revisado" entries use procedure+month key so they
          // deduplicate across re-runs and don't grow history unboundedly.
          function stableId(e) {
            if (e.changeKind === "revisado") {
              const procId = e.procedureIds?.[0] ?? e.eventId;
              return `revisado:${procId}:${yearMonth}`;
            }
            return e.eventId;
          }

          const existingById = new Map(existing.entries.map((e) => [e.id, e]));

          const newEntries = [];
          for (const e of updates.events) {
            const id = stableId(e);
            if (!existingById.has(id)) {
              newEntries.push({
                id,
                procedureId: e.procedureIds?.[0] ?? "",
                procedureTitle: e.summary,
                section: "",
                slug: "",
                changeKind: e.changeKind,
                changedAt: e.approvedAt || e.effectiveDate,
                summary: e.summary,
                diff: e.diff,
              });
            }
          }

          existing.entries = [...newEntries, ...existing.entries].slice(0, 500);
          existing.generatedAt = new Date().toISOString();
          fs.mkdirSync(path.dirname(HISTORY_PATH), { recursive: true });
          fs.writeFileSync(HISTORY_PATH, JSON.stringify(existing, null, 2) + "\n", "utf8");
          console.log(`Added ${newEntries.length} history entries. Total: ${existing.entries.length}`);
          EOF

      - name: Generate update report
        run: |
          node <<'NODE' > /tmp/manual-update-report.md
          const fs = require("fs");
          const sync = JSON.parse(fs.readFileSync("content/data/manual-sync.json", "utf8"));
          const updates = fs.existsSync("content/data/manual-updates.json")
            ? JSON.parse(fs.readFileSync("content/data/manual-updates.json", "utf8"))
            : { events: [] };
          const run = sync.runs?.[0];
          console.log("# ManualSAMUR monthly update report\n");
          console.log(`Generated: ${new Date().toISOString()}`);
          console.log(`Manual version: ${sync.manualVersionCurrent || sync.manualVersion || "unknown"}\n`);
          if (run) {
            console.log("## Domain summary\n");
            for (const [domain, summary] of Object.entries(run.summary || {})) {
              console.log(`- ${domain}: created ${summary.created || 0}, updated ${summary.updated || 0}, unchanged ${summary.unchanged || 0}, skipped ${summary.skipped || 0}, failed ${summary.failed || 0}`);
            }
            console.log("\n## Changes\n");
            for (const [domain, changes] of Object.entries(run.changes || {})) {
              const relevant = (changes || []).filter((change) => change.changeType !== "unchanged");
              if (relevant.length === 0) continue;
              console.log(`### ${domain}`);
              for (const change of relevant) {
                console.log(`- ${change.changeType}: ${change.id} ${change.title || ""}`);
              }
              console.log("");
            }
            const realErrors = (run.errors || []).filter((e) => !e.includes("content too short"));
            if (realErrors.length) {
              console.log("## Errors\n");
              for (const error of realErrors) console.log(`- ${error}`);
            }
          }
          const recent = (updates.events || []).slice(0, 20);
          if (recent.length) {
            console.log("\n## Recent history events\n");
            for (const event of recent) {
              console.log(`- ${event.changeKind}: ${event.summary} (${event.effectiveDate})`);
            }
          }
          NODE

      - name: Upload update artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: manual-update-detection
          path: |
            content/data/manual-sync.json
            content/data/manual-updates.json
            /tmp/manual-update-report.md
            content/data/manual-history.json

      - name: Print quick summary
        run: |
          echo "=== Sync summary ==="
          node -e 'const fs=require("fs");const data=JSON.parse(fs.readFileSync("content/data/manual-sync.json","utf8"));const run=data.runs?.[0];console.log(JSON.stringify({lastSyncAt:data.lastSyncAt,pendingChanges:data.pendingChanges?.length??0,runSummary:run?.summary??{}},null,2));'
          echo ""
          echo "=== History entries ==="
          node -e 'const fs=require("fs");try{const h=JSON.parse(fs.readFileSync("content/data/manual-history.json","utf8"));console.log(`${h.entries?.length??0} history entries, generated: ${h.generatedAt}`);}catch{console.log("No history file yet");}'
          echo ""
          echo "=== Missing codes check (8.x) ==="
          node -e 'const fs=require("fs");const codes=JSON.parse(fs.readFileSync("content/data/codigos-incidente.json","utf8"));const eights=codes.filter(c=>String(c.code).startsWith("8"));console.log("8.x codes:",eights.map(c=>c.code).join(", "));'

      - name: Create review pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/monthly-manual-update
          delete-branch: true
          title: "chore: monthly ManualSAMUR content update"
          body-path: /tmp/manual-update-report.md
          commit-message: "chore: update ManualSAMUR content snapshot"
          labels: |
            content
            automated
